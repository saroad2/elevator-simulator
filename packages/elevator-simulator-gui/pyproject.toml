[project]
name = "elevator-simulator-gui"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Sagi Buchbinder Shadur", email = "saroad2@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "elevator-simulator-core",
    "pygame>=2.6.1",
]

[project.gui-scripts]
elesim = "elevator_simulator.gui.__main__:main"

[build-system]
requires = ["uv_build>=0.10.10,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "elevator-simulator"
namespace = true

[tool.uv.sources]
elevator-simulator-core = { workspace = true }
